<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Synapse-Admin"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <title>Synapse-Admin</title>
    <style>
      body {
        background-color: #050505;
        color: #f5f5f5;
        font-family: "Space Grotesk", "Manrope", "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 0;
      }

      .loader-container {
        align-items: center;
        background:
          radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0) 30%),
          radial-gradient(circle at 80% 15%, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0) 26%),
          #050505;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
      }

      .loader {
        animation: spin 0.9s linear infinite;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-radius: 999px;
        border-top-color: #ffffff;
        box-sizing: border-box;
        height: 3.2rem;
        width: 3.2rem;
      }

      .loader-text {
        color: #bdbdbd;
        font-size: 0.88rem;
        letter-spacing: 0.04em;
        margin-top: 0.9rem;
        text-transform: uppercase;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loader-container">
        <div class="loader" aria-hidden="true"></div>
        <p class="loader-text">Loading control panel...</p>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
    <footer
      style="position: relative; z-index: 2; height: 2em; margin-top: -2em; line-height: 2em; background-color: rgba(8, 8, 8, 0.82); border-top: 1px solid rgba(255, 255, 255, 0.12);">
      <a id="copyright" href="https://github.com/Awesome-Technologies/synapse-admin"
        style="margin-left: 1em; color: #a8a8a8; font-family: 'Space Grotesk', 'Manrope', 'Segoe UI', sans-serif; font-weight: 500; font-size: 0.77em; letter-spacing: 0.02em; text-decoration: none;">
        Synapse-Admin <b><span id="version"></span></b> by Awesome Technologies Innovationslabor GmbH
      </a>
    </footer>
  </body>
  <script>
    const versionText =
      typeof __SYNAPSE_ADMIN_VERSION__ !== "undefined" ? __SYNAPSE_ADMIN_VERSION__ : "dev";
    document.getElementById("version").textContent = versionText;
  </script>
</html>
