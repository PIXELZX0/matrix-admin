services:
  matrix-admin:
    image: ${IMAGE_NAME:?Set IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: matrix-admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8787}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - 127.0.0.1:${APP_PORT:-8787}:8787
    volumes:
      - matrix-admin-data:/data

volumes:
  matrix-admin-data:
    name: ${DATA_VOLUME_NAME:-matrix-admin-data}
